  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.45) 50%,
      rgba(0,0,0,0.25) 100%
    );
    z-index: 1;
  }

  body {
    min-height: 100%;
    min-height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-size-adjust: 100%;
    -webkit-text-size-adjust: 100%;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem 1.5rem;
    padding-top: max(2rem, env(safe-area-inset-top));
    padding-bottom: max(2rem, env(safe-area-inset-bottom));
    padding-left: max(1.5rem, env(safe-area-inset-left));
    padding-right: max(1.5rem, env(safe-area-inset-right));
  }

  .avatar-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    margin-bottom: 1rem;
    border-radius: 50%;
    isolation: isolate;
    animation: sparkle-pulse 2.8s ease-in-out infinite;
  }

  /* Rotating diamond shimmer ring around the avatar */
  .avatar-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(
      from var(--shine-angle, 0deg),
      #ffffff 0%,
      #ffe6f4 8%,
      #ff7ec8 14%,
      #ffffff 22%,
      #d4f0ff 30%,
      #ffffff 40%,
      #ffb3e0 48%,
      #ffffff 56%,
      #fff5fb 66%,
      #ff7ec8 74%,
      #ffffff 82%,
      #d4f0ff 90%,
      #ffffff 100%
    );
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
            mask-composite: exclude;
    pointer-events: none;
    z-index: 2;
    animation: shimmer-rotate 3.5s linear infinite;
  }

  @supports not (background: conic-gradient(from var(--x, 0deg), red, blue)) {
    .avatar-wrap::before {
      animation: shimmer-rotate-fallback 3.5s linear infinite;
    }
  }

  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    position: relative;
    z-index: 1;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.35rem;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .tagline {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.85);
    margin-bottom: 0.75rem;
    text-align: center;
    line-height: 1.4;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .location-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.95);
    margin-bottom: 1.75rem;
    min-height: 32px;
    border: 1px solid rgba(255,255,255,0.25);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    width: 100%;
    max-width: 340px;
  }

  /* Register custom property so conic-gradient angle can animate */
  @property --shine-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  @keyframes shimmer-rotate {
    to { --shine-angle: 360deg; }
  }

  @keyframes shimmer-rotate-fallback {
    to { transform: rotate(360deg); }
  }

  @keyframes sparkle-pulse {
    0%, 100% {
      box-shadow:
        0 0 12px rgba(255, 255, 255, 0.35),
        0 0 24px rgba(255, 192, 230, 0.25),
        0 4px 16px rgba(0, 0, 0, 0.25);
    }
    50% {
      box-shadow:
        0 0 18px rgba(255, 255, 255, 0.55),
        0 0 36px rgba(255, 192, 230, 0.4),
        0 4px 16px rgba(0, 0, 0, 0.25);
    }
  }

  .btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 52px;
    padding: 0 1rem;
    border-radius: 50px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff;
    font-size: 1rem;
    font-weight: 500;
    text-align: center;
    text-decoration: none;
    border: none;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    overflow: hidden;
    isolation: isolate;
    animation: sparkle-pulse 2.8s ease-in-out infinite;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  /* Shimmering diamond rim: conic gradient rotates around the button */
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50px;
    padding: 2px;
    background: conic-gradient(
      from var(--shine-angle, 0deg),
      #ffffff 0%,
      #ffe6f4 8%,
      #ff7ec8 14%,
      #ffffff 22%,
      #d4f0ff 30%,
      #ffffff 40%,
      #ffb3e0 48%,
      #ffffff 56%,
      #fff5fb 66%,
      #ff7ec8 74%,
      #ffffff 82%,
      #d4f0ff 90%,
      #ffffff 100%
    );
    /* Mask to only show the ring, not fill */
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
            mask-composite: exclude;
    pointer-events: none;
    z-index: 1;
    animation: shimmer-rotate 3.5s linear infinite;
  }

  /* Tiny inner highlight to reinforce the glassy diamond feel */
  .btn::after {
    content: '';
    position: absolute;
    inset: 1px;
    border-radius: 50px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.18) 0%,
      rgba(255, 255, 255, 0) 45%,
      rgba(255, 255, 255, 0) 55%,
      rgba(255, 255, 255, 0.08) 100%
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Make sure the button text sits above the ::after highlight */
  .btn > * { position: relative; z-index: 2; }

  .btn:active {
    background: rgba(255,255,255,0.28);
    transform: scale(0.98);
  }
  @media (hover: hover) {
    .btn:hover {
      background: rgba(255,255,255,0.28);
    }
  }

  /* Fallback for browsers without @property support: still rotate the ring */
  @supports not (background: conic-gradient(from var(--x, 0deg), red, blue)) {
    .btn::before {
      animation: shimmer-rotate-fallback 3.5s linear infinite;
    }
  }
</style>
</head>

<script>
// Geolocation fallback
(function() {
  var fallbacks = [
    "Stockholm","Göteborg","Malmö","Uppsala","Linköping","Örebro","Västerås",
    "Helsingborg","Norrköping","Jönköping","Umeå","Lund","Gävle","Borås","Sundsvall",
    "Oslo","Bergen","Trondheim","Stavanger","Drammen","Kristiansand","Tromsø","Ålesund"
  ];
  function setCity(city) {
    var c = (city && city.trim().length > 1) ? city.trim() : fallbacks[Math.floor(Math.random() * fallbacks.length)];
    document.getElementById('loc-text').textContent = '5 minutes ago in: ' + c;
  }
  function get(url, extract) {
    return fetch(url, { cache: 'no-store' }).then(function(r) { return r.json(); }).then(function(d) {
      var v = extract(d);
      if (!v || v.trim().length < 2) throw new Error('no city');
      return v;
    });
  }
  get('https://ipinfo.io/json', function(d) { return d && d.city; })
    .catch(function() { return get('https://ip-api.com/json/?fields=city,regionName', function(d) { return d && (d.city || d.regionName); }); })
    .catch(function() { return get('https://ipapi.co/json/', function(d) { return d && (d.city || d.region); }); })
    .then(function(city) { setCity(city); })
    .catch(function() { setCity(null); });
})();
</script>
