<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#63e5ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>SandraSnow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }

  /* === BACKGROUND ===
     Replace this with an image, gradient, or color of your choice.
     Examples:
       background: #fafafa;
       background: linear-gradient(135deg, #fbcfe8, #ec4899);
       background-image: url('your-image.jpg'); background-size: cover;
  */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #63e5ff;
  }

  /* Subtle overlay for text readability — adjust opacity if your bg is light/dark */
  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.05) 0%,
      rgba(0,0,0,0.10) 50%,
      rgba(0,0,0,0.05) 100%
    );
    z-index: 1;
  }

  body {
    min-height: 100%;
    min-height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-size-adjust: 100%;
    -webkit-text-size-adjust: 100%;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem 1.5rem;
    padding-top: max(2rem, env(safe-area-inset-top));
    padding-bottom: max(2rem, env(safe-area-inset-bottom));
    padding-left: max(1.5rem, env(safe-area-inset-left));
    padding-right: max(1.5rem, env(safe-area-inset-right));
  }

  /* === AVATAR === */
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 1rem;
    border: 2.5px solid rgba(255, 255, 255, 0.85);
    background: #f0f0f0;
    box-shadow:
      0 0 0 1px rgba(180, 230, 255, 0.5),
      0 4px 14px rgba(99, 229, 255, 0.4);
  }

  /* === HEADINGS === */
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #222;
    margin-bottom: 0.35rem;
    letter-spacing: -0.01em;
  }

  .tagline {
    font-size: 0.9rem;
    color: rgba(0,0,0,0.6);
    margin-bottom: 0.75rem;
    text-align: center;
    line-height: 1.4;
  }

  /* === LOCATION PILL (matches ice button style) === */
  .location-pill {
    position: relative;
    isolation: isolate;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    font-size: 0.78rem;
    font-weight: 700;
    color: #1a4a6e;
    margin-bottom: 0.5rem;
    min-height: 32px;
    background: transparent;
    border: none;
    text-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9),
      0 0 6px rgba(255, 255, 255, 0.6);
    filter: drop-shadow(0 3px 6px rgba(20, 80, 120, 0.3));
  }

  .location-pill::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 36' preserveAspectRatio='none'><defs><linearGradient id='gp' x1='0' y1='0' x2='0' y2='1'><stop offset='0%25' stop-color='%23bce8f7'/><stop offset='25%25' stop-color='%2391d4ee'/><stop offset='55%25' stop-color='%2363bbe0'/><stop offset='100%25' stop-color='%2398d9ed'/></linearGradient><linearGradient id='rp' x1='0' y1='0' x2='0' y2='1'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='100%25' stop-color='%23d0eef9'/></linearGradient></defs><path d='M 10,6 Q 20,4 32,5 Q 48,4 66,5 Q 86,4 106,5 Q 126,4 144,5 Q 162,4 178,5 Q 188,7 192,12 Q 194,18 192,24 Q 188,29 178,31 Q 162,32 144,31 Q 126,32 106,31 Q 86,32 66,31 Q 48,32 32,31 Q 20,32 10,30 Q 4,28 2,22 Q 1,18 2,14 Q 4,8 10,6 Z' fill='url(%23gp)' stroke='url(%23rp)' stroke-width='1.2' stroke-linejoin='round'/><path d='M 14,10 L 60,8 L 64,12 L 16,14 Z' fill='%23ffffff' opacity='0.4'/><path d='M 110,9 L 170,7 L 174,11 L 112,13 Z' fill='%23ffffff' opacity='0.35'/><path d='M 30,24 L 90,23 L 92,27 L 32,28 Z' fill='%23ffffff' opacity='0.2'/></svg>");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    pointer-events: none;
    z-index: -1;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* === SNOWFALL === */
  .snow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 5; /* above background, below content */
  }

  .snowflake {
    position: absolute;
    top: -10%;
    user-select: none;
    will-change: transform;
    /* Force the emoji to render as solid white instead of the default blue */
    color: transparent;
    text-shadow: 0 0 0 #ffffff;
    animation-name: snow-fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }

  @keyframes snow-fall {
    0% {
      transform: translate3d(0, -10vh, 0) rotate(0deg);
      opacity: 0;
    }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% {
      transform: translate3d(var(--drift, 0px), 110vh, 0) rotate(360deg);
      opacity: 0;
    }
  }

  /* === BUTTONS === */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    width: 100%;
    max-width: 340px;
  }

  /* === FROZEN ICE BLOCK BUTTONS === */
  .btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 56px;
    padding: 0 1.5rem;
    /* No border-radius — the SVG background defines the jagged edge */
    background: transparent;
    color: #1a4a6e;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-align: center;
    text-decoration: none;
    border: none;
    text-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9),
      0 0 8px rgba(255, 255, 255, 0.6);
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    overflow: visible;
    transition: transform 0.15s ease, filter 0.2s ease;
    filter: drop-shadow(0 4px 8px rgba(20, 80, 120, 0.3));
  }

  /* Icon positioned absolutely on the left so it doesn't shift the centered text */
  .btn-icon {
    position: absolute;
    left: 1.25rem;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    display: block;
    pointer-events: none;
    /* Cold icy glow + slight inner shadow so icons feel embedded in the ice */
    filter:
      drop-shadow(0 0 2px rgba(255, 255, 255, 0.9))
      drop-shadow(0 1px 1px rgba(20, 80, 120, 0.4));
  }

  /* The carved ice block — jagged irregular shape behind the text */
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 340 56' preserveAspectRatio='none'><defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0%25' stop-color='%23bce8f7'/><stop offset='25%25' stop-color='%2391d4ee'/><stop offset='55%25' stop-color='%2363bbe0'/><stop offset='100%25' stop-color='%2398d9ed'/></linearGradient><linearGradient id='r' x1='0' y1='0' x2='0' y2='1'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='100%25' stop-color='%23d0eef9'/></linearGradient></defs><path d='M 14,9 Q 24,7 38,8 Q 56,6 78,8 Q 102,7 128,8 Q 156,7 184,8 Q 212,7 238,8 Q 264,7 286,8 Q 306,7 320,9 Q 332,11 334,18 Q 336,28 334,38 Q 332,48 320,50 Q 306,52 286,50 Q 264,52 238,50 Q 212,52 184,50 Q 156,52 128,50 Q 102,52 78,50 Q 56,52 38,50 Q 24,52 14,50 Q 6,48 4,38 Q 2,28 4,18 Q 6,11 14,9 Z' fill='url(%23g)' stroke='url(%23r)' stroke-width='1.5' stroke-linejoin='round'/><path d='M 16,16 L 56,12 L 60,18 L 18,22 Z' fill='%23ffffff' opacity='0.45'/><path d='M 100,14 L 180,10 L 184,16 L 102,20 Z' fill='%23ffffff' opacity='0.35'/><path d='M 220,15 L 310,11 L 314,17 L 222,21 Z' fill='%23ffffff' opacity='0.4'/><path d='M 30,38 L 90,36 L 92,42 L 32,44 Z' fill='%23ffffff' opacity='0.25'/><path d='M 140,38 L 230,36 L 232,42 L 142,44 Z' fill='%23ffffff' opacity='0.2'/></svg>");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    pointer-events: none;
    z-index: -1;
  }

  .btn:active {
    transform: scale(0.98);
    filter: drop-shadow(0 2px 4px rgba(20, 80, 120, 0.4));
  }

  @media (hover: hover) {
    .btn:hover {
      filter: drop-shadow(0 6px 12px rgba(20, 80, 120, 0.45)) brightness(1.05);
    }
  }

  /* === FEATURED BUTTON ===
     Subtle side-to-side wiggle with pauses between bursts */
  @keyframes featured-wiggle {
    0%, 70%, 100% { transform: translateX(0); }
    77%           { transform: translateX(-1.5px); }
    84%           { transform: translateX(1.5px); }
    91%           { transform: translateX(-1px); }
  }

  .btn--featured {
    animation: featured-wiggle 4s ease-in-out infinite;
  }

  /* Container for a button that has icicles dripping off its bottom edge */
  .btn-icy-wrap {
    position: relative;
    z-index: 0;
  }

  .icicles {
    position: absolute;
    top: 100%;
    left: 0;
    /* Pull up so icicle tops are hidden behind the button border */
    margin-top: -12px;
    width: 100%;
    height: 70px;
    pointer-events: none;
    /* Behind the button so icicle tops are concealed */
    z-index: -1;
    filter: drop-shadow(0 3px 4px rgba(20, 80, 120, 0.4));
  }
</style>
</head>

<script>
// Snowfall: generates falling snowflake emojis with random size, speed, and drift
(function() {
  var container = document.getElementById('snow');
  if (!container) return;

  var FLAKE_COUNT = 40;
  var EMOJIS = ['❄️', '❅', '❆'];

  for (var i = 0; i < FLAKE_COUNT; i++) {
    var flake = document.createElement('span');
    flake.className = 'snowflake';
    flake.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];

    // Random horizontal start position
    flake.style.left = (Math.random() * 100) + 'vw';

    // Random size between 0.7rem and 1.6rem
    var size = 0.7 + Math.random() * 0.9;
    flake.style.fontSize = size.toFixed(2) + 'rem';

    // Duration between 6s (fast) and 16s (slow drifting)
    var duration = 6 + Math.random() * 10;
    flake.style.animationDuration = duration.toFixed(2) + 's';

    // Negative delay so they don't all start at the top simultaneously
    flake.style.animationDelay = (-Math.random() * duration).toFixed(2) + 's';

    // Horizontal drift while falling
    var drift = (Math.random() * 160 - 80).toFixed(0) + 'px';
    flake.style.setProperty('--drift', drift);

    flake.style.opacity = (0.55 + Math.random() * 0.45).toFixed(2);

    container.appendChild(flake);
  }
})();
</script>

<script>
// Geolocation: shows "5 minutes ago in: [city]" based on visitor's IP
(function() {
  var fallbacks = [
    "Stockholm","Göteborg","Malmö","Uppsala","Linköping","Örebro","Västerås",
    "Helsingborg","Norrköping","Jönköping","Umeå","Lund","Gävle","Borås","Sundsvall",
    "Oslo","Bergen","Trondheim","Stavanger","Drammen","Kristiansand","Tromsø","Ålesund"
  ];
  function setCity(city) {
    var c = (city && city.trim().length > 1) ? city.trim() : fallbacks[Math.floor(Math.random() * fallbacks.length)];
    document.getElementById('loc-text').textContent = '5 minutes ago in: ' + c;
  }
  function get(url, extract) {
    return fetch(url, { cache: 'no-store' }).then(function(r) { return r.json(); }).then(function(d) {
      var v = extract(d);
      if (!v || v.trim().length < 2) throw new Error('no city');
      return v;
    });
  }
  get('https://ipinfo.io/json', function(d) { return d && d.city; })
    .catch(function() { return get('https://ip-api.com/json/?fields=city,regionName', function(d) { return d && (d.city || d.regionName); }); })
    .catch(function() { return get('https://ipapi.co/json/', function(d) { return d && (d.city || d.region); }); })
    .then(function(city) { setCity(city); })
    .catch(function() { setCity(null); });
})();
</script>
